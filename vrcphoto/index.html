<!doctype html>
<html lang="ja">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>VRChat Memories</title>

    <meta name="robots" content="noindex, nofollow" />

    <link rel="stylesheet" href="./style.css" />
</head>

<body>
    <header class="header">
        <div class="container">
            <div class="topbar">
                <div class="brand">
                    <div class="brand__title">VRChat Memories</div>
                    <div class="brand__sub">Where did I go and what did I see?</div>
                </div>

                <div class="control">
                    <label class="control__label" for="worldSelect">World</label>

                    <div class="select">
                        <select id="worldSelect" class="select__native"></select>
                        <span class="select__arrow" aria-hidden="true"></span>
                    </div>
                </div>

                <div class="control control--checkbox">
                    <div class="control__label">Grouping</div>

                    <label class="checkbox">
                        <input id="groupToggle" type="checkbox" />
                        <span class="checkbox__text">Group by world</span>
                    </label>
                </div>
            </div>

            <div id="status" class="status">loading...</div>
        </div>
    </header>

    <main class="main">
        <div class="container">
            <div id="content"></div>
        </div>
    </main>

    <footer class="footer">
        <div class="container">
            <div class="footer__text">© 2026 Neu Makise. All rights reserved.</div>
        </div>
    </footer>

    <!-- Modal -->
    <div id="photoModal" class="modal" aria-hidden="true">
        <div class="modal__dialog" role="dialog" aria-modal="true" aria-label="Photo">
            <div id="modalPolaroid" class="polaroid">
                <div class="polaroid__photo">
                    <img id="modalImage" alt="" />
                </div>

                <div class="polaroid__footer">
                    <div class="polaroid__meta">
                        <!-- aタグに変更（JSでhrefの有無を切り替える） -->
                        <a id="modalWorldName" class="polaroid__world polaroid__worldlink"></a>

                        <div class="polaroid__sub">
                            <span id="modalSha1" class="polaroid__sha1"></span>
                            <span class="polaroid__sep" aria-hidden="true">•</span>
                            <span id="modalTakenAt" class="polaroid__takenat"></span>
                        </div>
                    </div>

                    <button id="modalClose" class="polaroid__close" type="button" aria-label="Close">×</button>
                </div>
            </div>
        </div>
    </div>

    <script src="./app.js"></script>
</body>

</html>
